env:
  BUILDKITE_CLEAN_CHECKOUT: true

steps:
  - label: ":white_check_mark: CI queue metadata no-op"
    command: |
      set -eu
      echo "codex-h062 benign Buildkite queue metadata probe"
      echo "queue=${BUILDKITE_AGENT_META_DATA_QUEUE:-unset}"
      echo "pipeline=${BUILDKITE_PIPELINE_NAME:-unset}"
      echo "branch=${BUILDKITE_BRANCH:-unset}"
      echo "commit=${BUILDKITE_COMMIT:-unset}"
      echo "job=${BUILDKITE_JOB_ID:-unset}"
    agents:
      queue: release
