syntax = "proto3";

package gvisor.sentry;

import "pkg/sentry/seccheck/points/common.proto";

// CloneInfo contains information used by the Clone checkpoint.
message CloneInfo {
  gvisor.common.ContextData context_data = 1;

  // created_thread_id is the thread's ID in the root PID namespace.
  int32 created_thread_id = 3;

  int32 created_thread_group_id = 4;

  // created_thread_start_time_ns is the thread's CLOCK_REALTIME start time.
  int64 created_thread_start_time_ns = 5;

  // flags are equivalent to the flags passed to clone(2).
  uint64 flags = 6;
}

// ExecveInfo contains information used by the Execve checkpoint.
message ExecveInfo {
  gvisor.common.ContextData context_data = 1;

  // BinaryPath is a path to the executable binary file being switched to in
  // the mount namespace in which it was opened.
  string binary_path = 2;

  // Argv is the new process image's argument vector.
  repeated string argv = 3;

  // Env is the new process image's environment variables.
  repeated string env = 4;

  // BinaryMode is the executable binary file's mode.
  uint32 binary_mode = 5;

  uint32 binary_uid = 6;
  uint32 binary_gid = 7;

  // BinarySha256 is the SHA-256 hash of the executable binary file.
  //
  // Note that this requires reading the entire file into memory, which is
  // likely to be extremely slow.
  bytes binary_sha256 = 8;

  // BinaryOverlayfsUpper indicates whether the executable binary is on
  // the upper layer of the overlay filesystem.
  bool binary_overlayfs_upper = 9;

  // BinaryIno is the virtualized inode number of the executable binary file.
  uint64 binary_ino = 10;

  // BinaryCtime is the ctime of the executable binary file.
  gvisor.common.Timespec binary_ctime = 11;
}

message ExitNotifyParentInfo {
  gvisor.common.ContextData context_data = 1;

  // ExitStatus is the exiting thread group's exit status, as reported
  // by wait*().
  int32 exit_status = 2;
}

message TaskExit {
  gvisor.common.ContextData context_data = 1;

  // ExitStatus is the exiting thread group's exit status, as reported
  // by wait*().
  int32 exit_status = 2;
}

message MmapInfo {
  gvisor.common.ContextData context_data = 1;

  // MappedPath is the path of the file backing the memory mapping, if any.
  string mapped_path = 2;

  // MappedIno is the inode number of the backing file.
  uint64 mapped_ino = 3;

  // MappedMode is the file mode (permissions and type) of the backing file.
  uint32 mapped_mode = 4;

  // MappedUid is the user ID of the owner of the backing file.
  uint32 mapped_uid = 5;

  // MappedGid is the group ID of the owner of the backing file.
  uint32 mapped_gid = 6;

  // IsInitialMmap indicates whether this mapping corresponds to the task's
  // initial executable file.
  bool is_initial_mmap = 7;

  // MappedCtime is the ctime of the backing file.
  gvisor.common.Timespec mapped_ctime = 8;
}
